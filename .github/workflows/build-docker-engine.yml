name: build-docker-engine

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
      - 'docker/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-docker-engine.yml'
      - 'hack/scripts/**'
      - 'pkg/docker-engine/**'
      - 'docker-bake.hcl'
  pull_request:
    branches:
      - 'main'
      - 'docker/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-docker-engine.yml'
      - 'hack/scripts/**'
      - 'pkg/docker-engine/**'
      - 'docker-bake.hcl'

jobs:
  run:
    uses: ./.github/workflows/.build.yml
    permissions:
      contents: read
    with:
      name: docker-engine
